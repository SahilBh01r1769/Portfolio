/* ── PROJECTS ── */
function renderProjects(d){
  const filterCategories = [
    { key: "all", label: "All Projects" },
    { key: "cv",  label: "Computer Vision" },
    { key: "dl",  label: "Deep Learning" },
    { key: "cloud", label: "Cloud / AWS" },
    { key: "nlp",   label: "NLP" },
  ];
  const filterBtns = filterCategories.map((f,i)=>
    `<button class="filter-btn${i===0?' active':''}" onclick="filterProjects('${f.key}',this)">${f.label}</button>`
  ).join('');

  const cards = d.projects.map((p,i)=>{
    const tags = p.tags.map(t=>`<span class="tag">${t}</span>`).join('');
    const isFeaturedCV  = p.category === 'cv'  && p.featured;
    const isFeaturedDL  = p.category === 'dl'  && p.featured;
    const isFeatured    = p.featured;
    const span   = isFeatured ? 'grid-column:span 2;' : '';
    const imgH   = isFeatured ? '240px' : '180px';
    const pad    = isFeatured ? '28px' : '22px';
    const titleSz= isFeatured ? '22px' : '18px';
    const delay  = `reveal-delay-${Math.min(i,4)}`;

    // Special glow colors per category
    const categoryGlow = {
      cv:    'rgba(239,68,68,0.08)',
      dl:    'rgba(139,92,246,0.08)',
      cloud: 'rgba(34,211,238,0.08)',
      nlp:   'rgba(99,102,241,0.08)',
    }[p.category] || 'rgba(99,102,241,0.08)';

    const categoryAccent = {
      cv:    'rgba(239,68,68,0.3)',
      dl:    'rgba(139,92,246,0.3)',
      cloud: 'rgba(34,211,238,0.3)',
      nlp:   'rgba(99,102,241,0.3)',
    }[p.category] || 'rgba(99,102,241,0.3)';

    const archFlow = isFeatured && p.architecture ? `
      <div style="margin-bottom:16px;">
        <p style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Architecture Flow</p>
        <div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px;">
          ${p.architecture.map((step,idx)=>`
            <div class="arch-step" style="background:${categoryGlow};border-color:${categoryAccent};">${step}</div>
            ${idx < p.architecture.length-1 ? '<span class="arch-arrow">→</span>' : ''}
          `).join('')}
        </div>
      </div>` : '';

    const featuredBadge = isFeatured ? `<div class="featured-badge">⭐ Featured</div>` : '';

    return `
    <div class="proj-card reveal ${delay}" style="${span}" data-category="${p.category}">
      <div style="height:${imgH};overflow:hidden;position:relative;">
        <img src="${p.image}" style="width:100%;height:100%;object-fit:cover;transition:transform 0.6s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(3,7,18,0.85));"></div>
        <div style="position:absolute;top:14px;left:14px;" class="tag">${p.label}</div>
        ${featuredBadge}
      </div>
      <div style="padding:${pad};">
        <h3 class="display" style="font-size:${titleSz};font-weight:700;margin-bottom:8px;">${p.title}</h3>
        <p style="font-size:13px;color:#64748b;line-height:1.8;margin-bottom:14px;">${p.desc}</p>
        ${p.highlight ? `<p style="font-size:12px;color:#a5b4fc;margin-bottom:14px;font-weight:500;padding:8px 12px;background:${categoryGlow};border-radius:8px;border-left:3px solid ${categoryAccent};">✦ ${p.highlight}</p>` : ''}
        ${archFlow}
        <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;">${tags}</div>
        <div style="display:flex;gap:10px;">
          <a href="${p.demo}" class="btn-primary" style="padding:10px 18px;font-size:13px;flex:1;justify-content:center;"><i class="fas fa-external-link-alt" style="font-size:11px;"></i> Demo</a>
          <a href="${p.repo}" target="_blank" class="btn-ghost" style="padding:10px 18px;font-size:13px;flex:1;justify-content:center;"><i class="fab fa-github" style="font-size:13px;"></i> GitHub</a>
        </div>
      </div>
    </div>`;
  }).join('');

  return `
  <section id="projects" style="padding:120px 32px;background:var(--bg);" class="grid-bg">
    <div style="max-width:1200px;margin:0 auto;">
      <div style="margin-bottom:48px;" class="reveal">
        <p class="sec-label">What I've Built</p>
        <h2 class="display" style="font-size:clamp(34px,4vw,50px);font-weight:800;letter-spacing:-0.02em;">Featured <span class="grad">Projects</span></h2>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:36px;" class="reveal reveal-delay-1">
        ${filterBtns}
      </div>
      <div id="proj-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;">${cards}</div>
    </div>
  </section>`;
}

/* ── SKILLS ── */

  const cats = d.skillCategories.map((cat,i)=>{
    const pills = cat.skills.map(s=>`
      <div class="skill-pill">
        <i class="${s.icon}" style="color:${s.color};width:18px;font-size:15px;"></i>
        <span style="flex:1;">${s.name}</span>
        <span style="font-size:11px;color:var(--muted);">${s.level}</span>
      </div>`).join('');
    return `
    <div class="reveal reveal-delay-${i} glass" style="padding:26px;border-radius:20px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">

  renderAbout(DATA) +

  renderProjects(DATA) +

  renderJourney(DATA) +

  renderCerts(DATA) +

/* ── INIT ── */
document.title = DATA.title;
document.getElementById('nav-logo').textContent = DATA.name.split(' ').map(w=>w[0]).join('');

new Typed('#typing', { strings: DATA.typingStrings, typeSpeed: 55, backSpeed: 35, loop: true });

const banner = document.getElementById('tech-banner');
if(banner){
  const all = [...DATA.techBanner, ...DATA.techBanner];
  banner.innerHTML = all.map(t=>`
    <div style="display:flex;align-items:center;gap:24px;padding:0 24px;color:var(--muted);font-size:13px;font-weight:500;letter-spacing:0.05em;white-space:nowrap;">
      <span style="width:4px;height:4px;border-radius:50%;background:rgba(99,102,241,0.4);flex-shrink:0;"></span>
      ${t}
    </div>`).join('');
}

document.getElementById('cursor-glow').style.display = 'block';
document.addEventListener('mousemove', e => {
  const g = document.getElementById('cursor-glow');
  g.style.left = e.clientX + 'px'; g.style.top = e.clientY + 'px';
});

window.addEventListener('scroll', () => {
  const nav = document.getElementById('navbar');
  const cta = document.getElementById('nav-cta');
  if(window.scrollY > 80){ nav.classList.add('scrolled'); cta.style.display='inline-flex'; }
  else { nav.classList.remove('scrolled'); cta.style.display='none'; }
});

const revObs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
document.querySelectorAll('.reveal').forEach(el => revObs.observe(el));

/* ── PROJECT FILTER ── */
function filterProjects(category, btn){
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const grid = document.getElementById('proj-grid');
  const cards = grid.querySelectorAll('.proj-card');
  let visibleCount = 0;

  cards.forEach(card => {
    const cat = card.getAttribute('data-category');
    const match = category === 'all' || cat === category;
    card.style.display = match ? '' : 'none';
    if(match){
      // Reset span for non-featured when filtering
      const isSpanned = card.style.gridColumn === 'span 2';
      if(category !== 'all' && isSpanned){ card.style.gridColumn = 'span 1'; }
      else if(category === 'all' && card.querySelector('[style*="featured-badge"]')){ card.style.gridColumn = 'span 2'; }
      visibleCount++;
    }
  });

  // Rebuild grid layout after filter
  if(category !== 'all'){
    grid.style.gridTemplateColumns = visibleCount === 1 ? '1fr' : 'repeat(2,1fr)';
  } else {
    fixLayout();
  }
}

function handleSubmit(e){
  e.preventDefault();
  document.getElementById('contact-form').style.display='none';
  document.getElementById('form-success').style.display='block';
}
function toggleMenu(){ document.getElementById('mobile-menu').classList.add('open'); }
function closeMobileMenu(){ document.getElementById('mobile-menu').classList.remove('open'); }
document.getElementById('close-menu').onclick = closeMobileMenu;

document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    const id = a.getAttribute('href');
    if(id==='#') return;
    const target = document.querySelector(id);
    if(target){ e.preventDefault(); target.scrollIntoView({ behavior:'smooth' }); }
  });
});

function fixLayout(){
  const hg = document.getElementById('hero-grid');
  const hc = document.getElementById('hero-card');
  const ag = document.getElementById('about-grid');
  const cg = document.getElementById('contact-grid');
  const pg = document.getElementById('proj-grid');
  const hireG = document.getElementById('hire-grid');
  const ham = document.getElementById('ham-btn');
  const w = window.innerWidth;

  if(hg){ hg.style.gridTemplateColumns = w < 1024 ? '1fr' : '1fr 420px'; }
  if(hc){ hc.style.display = w < 1024 ? 'none' : 'flex'; }
  if(ag){ ag.style.gridTemplateColumns = w < 900 ? '1fr' : '1fr 1fr'; }
  if(cg){ cg.style.gridTemplateColumns = w < 900 ? '1fr' : '1fr 1.2fr'; }
  if(hireG){ hireG.style.gridTemplateColumns = w < 900 ? '1fr' : '1fr 1fr'; }
  if(pg && w < 900){
    pg.style.gridTemplateColumns = '1fr';
    pg.querySelectorAll('[style*="grid-column"]').forEach(el => el.style.gridColumn='span 1');
  } else if(pg){
    pg.style.gridTemplateColumns = 'repeat(3,1fr)';
  }
  if(ham){ ham.style.display = w < 768 ? 'flex' : 'none'; }
}
fixLayout();
window.addEventListener('resize', fixLayout);
</script>
